<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            padding-top: 80px;  /* Add padding to the top to avoid content hiding under the fixed header */
        }

        /* Header Section */
        header {
            background-color: #000;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;  /* Fixes the header at the top */
            left: 0;  /* Ensures it starts from the left edge */
            width: 100%;  /* Ensures it spans the full width of the page */
            z-index: 1000;  /* Keeps the header above other content */
        }

        header .logo {
            font-size: 2rem;
            font-weight: bold;
        }

        nav ul {
            list-style-type: none;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            display: inline-block;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 1rem;
            padding: 10px;
        }

        /* Checkout Section */
        .checkout-section {
            padding: 50px 20px;
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .checkout-section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .checkout-section p {
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 1rem;
            margin: 10px 0 5px;
        }

        input, select {
            padding: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
    
        }

        button {
            background-color: #111;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #333;
        }

        /* Footer Section */
        footer {
            background-color: #0e0d0d;
            color: white;
            text-align: center;
            padding: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo">ShoesHub</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="login.html">Login</a></li>
                <!-- <li><a href="registration.html">Registration</a></li> -->
            </ul>
        </nav>
    </header>

    <!-- Checkout Section -->
    <section id="checkout" class="checkout-section">
        <h2>Checkout</h2>
        <p>Fill out the form to complete your purchase.</p>
        <form id="checkout-form">
            <label for="name">Name:</label>
            <input type="text" id="name" required>

            <label for="phone number">Phone Number:</label>
            <input type="text" id="phone number" required>

            <label for="address">Address:</label>
            <input type="text" id="address" required>

            <label for="payment">Payment Method:</label>
            <select id="payment" required>
                <option value="credit-card">Credit Card</option>
                <option value="paypal">PayPal</option>
            </select>

            <button type="submit">Complete Purchase</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2025 ShoesHub. All rights reserved.</p>
    </footer>

    <script>
        // Form submission logic
        document.getElementById('checkout-form').addEventListener('submit', function(event) {
            event.preventDefault();

            // Get form values
            const name = document.getElementById('name').value;
            const phoneNumber = document.getElementById('phone number').value;
            const address = document.getElementById('address').value;
            const paymentMethod = document.getElementById('payment').value;

            // Simple validation
            if (name === '' || address === '' || paymentMethod === '') {
                alert('Please fill out all fields!');
            } else {
                // Simulate the checkout process (In a real scenario, you would send the data to a server)
                alert(`Thank you, ${name}! Your order has been placed.\n\nShipping to: ${address}\nPayment Method: ${paymentMethod}`);
                // Reset the form after submission
                document.getElementById('checkout-form').reset();
            }
        });
    </script>

</body>
</html>
